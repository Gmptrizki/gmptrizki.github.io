<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pembagian Kelompok Acak</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container fade-in">
    <h1>Pembagian Kelompok Acak</h1>
    <div class="control-box">
      <label for="jumlahKelompok">Jumlah Kelompok:</label>
      <input type="number" id="jumlahKelompok" min="1" max="36" value="5">
      <button id="btnAcak">Acak</button>
      <button id="btnJpg">Download JPG</button>
      <button id="btnPdf">Download PDF</button>
    </div>

    <div id="captureArea" class="capture-box">
      <div id="result" class="result-box"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
